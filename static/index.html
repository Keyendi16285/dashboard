<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASSFOIA - Application Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-100 min-h-screen flex flex-col">

    <header class="border-b border-slate-800 bg-[#1e293b]/50 backdrop-blur-md px-6 py-4 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center space-x-3">
            <div class="h-8 w-8 rounded-lg bg-blue-600 flex items-center justify-center font-bold text-white shadow-lg shadow-blue-500/20">
                M
            </div>
            <div>
                <span class="font-bold text-lg tracking-tight bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">MASSFOIA</span>
                <span class="text-xs text-slate-500 ml-2 font-medium hidden sm:inline-block border border-slate-800 rounded px-1.5 py-0.5 bg-slate-900">ENTERPRISE OS</span>
            </div>
        </div>
        
        <div class="flex items-center space-x-4">
            <span class="text-sm text-slate-400 font-medium flex items-center">
                <span class="h-2 w-2 rounded-full bg-emerald-500 mr-2 animate-pulse"></span>
                Active Session
            </span>
            <button onclick="logout()" class="text-sm font-medium text-slate-400 hover:text-rose-400 transition-colors border border-slate-800 hover:border-rose-950 px-3 py-1.5 rounded-lg bg-slate-900/50">
                Sign Out
            </button>
        </div>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center p-6 max-w-6xl mx-auto w-full">
        
        <div class="text-center max-w-xl mb-12 animate-fade-in">
            <h1 class="text-3xl sm:text-4xl font-extrabold tracking-tight text-white mb-3">
                Application Ecosystem
            </h1>
            <p class="text-slate-400 text-sm sm:text-base leading-relaxed">
                Welcome to the central command hub. Select an application below to seamlessly launch into your workstation.
            </p>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 w-full">
            
            <button onclick="navigateWithToken('https://casetracker.massfoia.com')" class="group text-left p-6 rounded-xl border border-slate-800 bg-[#1e293b]/30 hover:bg-[#1e293b]/60 transition-all duration-300 hover:border-blue-500/50 hover:shadow-2xl hover:shadow-blue-500/5 flex flex-col justify-between cursor-pointer focus:outline-none focus:ring-2 focus:ring-blue-500">
                <div>
                    <div class="h-12 w-12 rounded-xl bg-blue-500/10 border border-blue-500/20 text-blue-400 flex items-center justify-center mb-6 group-hover:scale-110 group-hover:bg-blue-500/20 transition-transform duration-300">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                        </svg>
                    </div>
                    <h3 class="text-lg font-bold text-white group-hover:text-blue-400 transition-colors">Case Tracker</h3>
                    <p class="text-slate-400 text-xs mt-2 leading-relaxed">Monitor public records request files, litigation histories, schedules, and active compliance deadlines.</p>
                </div>
                <div class="mt-6 flex items-center text-xs font-semibold text-blue-400 opacity-0 group-hover:opacity-100 transition-opacity">
                    Launch Application <span class="ml-1 transform group-hover:translate-x-1 transition-transform">→</span>
                </div>
            </button>

            <button onclick="navigateWithToken('https://returnalyzer.massfoia.com')" class="group text-left p-6 rounded-xl border border-slate-800 bg-[#1e293b]/30 hover:bg-[#1e293b]/60 transition-all duration-300 hover:border-violet-500/50 hover:shadow-2xl hover:shadow-violet-500/5 flex flex-col justify-between cursor-pointer focus:outline-none focus:ring-2 focus:ring-violet-500">
                <div>
                    <div class="h-12 w-12 rounded-xl bg-violet-500/10 border border-violet-500/20 text-violet-400 flex items-center justify-center mb-6 group-hover:scale-110 group-hover:bg-violet-500/20 transition-transform duration-300">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M7 12l3-3 3 3 4-4M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z" />
                        </svg>
                    </div>
                    <h3 class="text-lg font-bold text-white group-hover:text-violet-400 transition-colors">Returnalyzer</h3>
                    <p class="text-slate-400 text-xs mt-2 leading-relaxed">Analyze performance patterns, response turnarounds, metrics, and systemic agency behavior yields.</p>
                </div>
                <div class="mt-6 flex items-center text-xs font-semibold text-violet-400 opacity-0 group-hover:opacity-100 transition-opacity">
                    Launch Application <span class="ml-1 transform group-hover:translate-x-1 transition-transform">→</span>
                </div>
            </button>

            <button onclick="navigateWithToken('https://papers.massfoia.com/')" class="group text-left p-6 rounded-xl border border-slate-800 bg-[#1e293b]/30 hover:bg-[#1e293b]/60 transition-all duration-300 hover:border-emerald-500/50 hover:shadow-2xl hover:shadow-emerald-500/5 flex flex-col justify-between cursor-pointer focus:outline-none focus:ring-2 focus:ring-emerald-500">
                <div>
                    <div class="h-12 w-12 rounded-xl bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 flex items-center justify-center mb-6 group-hover:scale-110 group-hover:bg-emerald-500/20 transition-transform duration-300">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                        </svg>
                    </div>
                    <h3 class="text-lg font-bold text-white group-hover:text-emerald-400 transition-colors">Papers</h3>
                    <p class="text-slate-400 text-xs mt-2 leading-relaxed">Document repository containing generated indexes, direct court evidence files, briefs, and exhibits.</p>
                </div>
                <div class="mt-6 flex items-center text-xs font-semibold text-emerald-400 opacity-0 group-hover:opacity-100 transition-opacity">
                    Launch Application <span class="ml-1 transform group-hover:translate-x-1 transition-transform">→</span>
                </div>
            </button>

            <button onclick="window.location.href='/defendants'" class="group text-left p-6 rounded-xl border border-slate-800 bg-[#1e293b]/30 hover:bg-[#1e293b]/60 transition-all duration-300 hover:border-amber-500/50 hover:shadow-2xl hover:shadow-amber-500/5 flex flex-col justify-between cursor-pointer focus:outline-none focus:ring-2 focus:ring-amber-500">
                <div>
                    <div class="h-12 w-12 rounded-xl bg-amber-500/10 border border-amber-500/20 text-amber-400 flex items-center justify-center mb-6 group-hover:scale-110 group-hover:bg-amber-500/20 transition-transform duration-300">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
                        </svg>
                    </div>
                    <h3 class="text-lg font-bold text-white group-hover:text-amber-400 transition-colors">Defendants Registry</h3>
                    <p class="text-slate-400 text-xs mt-2 leading-relaxed">Direct internal query access to track defendant metrics, class filters, and database cross-references.</p>
                </div>
                <div class="mt-6 flex items-center text-xs font-semibold text-amber-400 opacity-0 group-hover:opacity-100 transition-opacity">
                    View Registry Table <span class="ml-1 transform group-hover:translate-x-1 transition-transform">→</span>
                </div>
            </button>

        </div>
    </main>

    <footer class="border-t border-slate-900 bg-[#090d16] px-6 py-3 flex flex-col sm:flex-row items-center justify-between text-xs text-slate-500">
        <div>&copy; 2026 MASSFOIA. All rights reserved.</div>
        <div class="flex items-center space-x-4 mt-2 sm:mt-0 font-mono">
            <span>ENV: production</span>
            <span>NODE: hetzner-core-01</span>
        </div>
    </footer>

    <script src="/static/dashboard-main.js"></script>
</body>
</html>
